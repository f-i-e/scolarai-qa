# Backend auth Playwright tests — HTML report:
#
# 1) Artifacts — Actions run → playwright-report zip (always).
# 2) Your server — set repo vars + secret below; rsync uploads playwright-report/ (static files).
#    Example: nginx root = QA_REPORT_DEPLOY_PATH, server_name qa.kimboli.com;
#    Vars: QA_REPORT_DEPLOY_HOST, QA_REPORT_DEPLOY_USER (optional, default ubuntu),
#          QA_REPORT_DEPLOY_PATH (optional, default /var/www/playwright-report)
#    Secret: QA_REPORT_SSH_KEY (deploy user private key; host key is learned via ssh-keyscan)
#    Optional var: QA_REPORT_PUBLIC_URL — printed in job summary (e.g. https://qa.kimboli.com/)
#    Rsync runs only on push to main|master or workflow_dispatch (not every PR), so the URL stays “latest main”.

name: Playwright — backend + frontend

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: playwright-auth-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  auth-api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium only — enough for API tests + HTML report)
        run: npx playwright install chromium --with-deps

      - name: Run all tests (backend + frontend)
        env:
          SCHOLARAI_API_BASE_URL: ${{ vars.SCHOLARAI_API_BASE_URL }}
          SCHOLARAI_API_VERSION_PREFIX: ${{ vars.SCHOLARAI_API_VERSION_PREFIX }}
          SCHOLARAI_TEST_EMAIL_DOMAIN: ${{ vars.SCHOLARAI_TEST_EMAIL_DOMAIN }}
          SCHOLARAI_VERIFIED_USER_EMAIL: ${{ secrets.SCHOLARAI_VERIFIED_USER_EMAIL }}
          SCHOLARAI_VERIFIED_USER_PASSWORD: ${{ secrets.SCHOLARAI_VERIFIED_USER_PASSWORD }}
          SCHOLARAI_FRONTEND_BASE_URL: ${{ vars.SCHOLARAI_FRONTEND_BASE_URL }}
        run: |
          export SCHOLARAI_API_BASE_URL="${SCHOLARAI_API_BASE_URL:-https://test-api.scolarai.com}"
          export SCHOLARAI_FRONTEND_BASE_URL="${SCHOLARAI_FRONTEND_BASE_URL:-https://develop.kimboli.com}"
          npx playwright test

      - name: Upload Playwright HTML report (download zip from run)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright test-results (traces / attachments)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Detect HTML report for rsync / summary
        id: report-meta
        if: always()
        run: |
          if [ -f playwright-report/index.html ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up SSH for QA report rsync
        if: >
          always() &&
          steps.report-meta.outputs.exists == 'true' &&
          vars.QA_REPORT_DEPLOY_HOST != '' &&
          (github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')))
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.QA_REPORT_SSH_KEY }}

      - name: Rsync Playwright report to your server
        if: >
          always() &&
          steps.report-meta.outputs.exists == 'true' &&
          vars.QA_REPORT_DEPLOY_HOST != '' &&
          (github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')))
        env:
          DEPLOY_HOST: ${{ vars.QA_REPORT_DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.QA_REPORT_DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.QA_REPORT_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          SSH_USER="${DEPLOY_USER:-ubuntu}"
          REMOTE_PATH="${DEPLOY_PATH:-/var/www/playwright-report}"
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz -e ssh --delete ./playwright-report/ "${SSH_USER}@${DEPLOY_HOST}:${REMOTE_PATH}/"

      - name: QA report URL (job summary)
        if: >
          always() &&
          steps.report-meta.outputs.exists == 'true' &&
          vars.QA_REPORT_PUBLIC_URL != '' &&
          (github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')))
        env:
          QA_REPORT_PUBLIC_URL: ${{ vars.QA_REPORT_PUBLIC_URL }}
        run: |
          {
            echo "### QA Playwright report"
            echo "Open: ${QA_REPORT_PUBLIC_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
